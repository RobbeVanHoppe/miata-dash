name: Arduino Tests

on:
  push:
    branches: [ rpi, main ]
    paths:
      - 'src/arduino_**'
      - 'include/**'
      - 'test/**'
      - 'platformio.ini'
  pull_request:
    paths:
      - 'src/arduino_**'
      - 'include/**'
      - 'test/**'
      - 'platformio.ini'

jobs:
  test-sensors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install platformio
      - name: Run sensor tests
        run: pio test -e test_sensors

  test-gps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install platformio
      - name: Run GPS tests
        run: pio test -e test_gps

  test-imu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install platformio
      - name: Run IMU tests
        run: pio test -e test_imu