; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<arduino_gps/**> -<arduino_tm1638/**> -<arduino_mpu9250/**> -<arduino_sensors/**>
lib_deps =
    adafruit/Adafruit GC9A01A@^1.1.0

[env:nano_gps]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = +<arduino_gps/**>
lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0

[env:nano_tm1638]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = +<arduino_tm1638/**>
lib_deps =
    gavinlyonsrepo/TM1638plus@^2.2.0

[env:nano_mpu9250]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = +<arduino_mpu9250/**>
lib_deps =
    wollewald/MPU9250_WE @ ^1.2.17

[env:nano_sensors]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = +<arduino_sensors/**>
