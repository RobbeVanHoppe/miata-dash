; PlatformIO Project Configuration File
; Unified ESP32 sensor node replaces 3× Arduino Nano boards

[env:esp32_node]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<esp32_node/**>
lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0
    wollewald/MPU9250_WE@^1.2.17

[env:native_tests]
platform = native
test_framework = unity
build_flags =
    -I include
    -I test/stubs