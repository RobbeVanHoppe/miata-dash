; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; ── Arduino build environments ─────────────────────────────────────────────

[env:nano_gps]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = +<arduino_gps/**>
test_ignore = *
lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0

[env:nano_mpu9250]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = +<arduino_mpu9250/**>
test_ignore = *
lib_deps =
    wollewald/MPU9250_WE@^1.2.17

[env:nano_sensors]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = +<arduino_sensors/**>
test_ignore = *

; ── Native test environment ─────────────────────────────────────────────────

[env:native_tests]
platform = native
test_framework = unity
build_flags =
    -I include
    -I test/stubs